<!DOCTYPE html>
<html lang="es" data-sn-theme="light" data-trio="plex">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lectógrafo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans+Condensed:ital,wght@0,300;0,400&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./sistema/tokens.css">
  <link rel="stylesheet" href="./style.css">
  <style>
    /* Layout mínimo propio del sitio publicado — no toca static/style.css */
    body { min-height: 100vh; }
    #vista-biblioteca { display: block !important; }
    a.bib-card { text-decoration: none; color: inherit; }
    .bib-card-meta { font-size: var(--sn-fs-xs); color: var(--sn-ink-soft); opacity: .7; }
  </style>
</head>
<body>

  <header id="topbar">
    <div id="topbar-left">
      <span id="app-name">Lectógrafo</span>
    </div>
  </header>

  <div id="vista-biblioteca">
    <div id="biblioteca-header"></div>
    <div id="biblioteca-grid"></div>
    <p id="biblioteca-vacio" class="muted" hidden>Todavía no hay grafos publicados.</p>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
